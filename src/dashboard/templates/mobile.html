<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Bot</title>
    <link rel="stylesheet" href="/static/mobile.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
</head>
<body>
<nav style="display:flex;gap:1.5rem;padding:0.75rem 1.5rem;background:#1a1a2e;border-bottom:1px solid #333;font-size:0.9rem;">
  <a href="/" style="color:#e0e0e0;text-decoration:none;font-weight:600;">Event Markets</a>
  <a href="/crypto" style="color:#f0c040;text-decoration:none;">Crypto 5-Min</a>
</nav>
    <header>
        <div class="header-left">
            <div class="header-dot"></div>
            <span class="header-title">Polymarket Bot</span>
        </div>
        <div id="status-badge" hx-get="/api/status" hx-trigger="load, every 10s"
             hx-swap="innerHTML" class="header-status"></div>
        <nav class="header-actions">
            <button hx-post="/api/scan" hx-swap="none" class="btn-sm" onclick="toast('Scan triggered')">Scan</button>
            <button hx-post="/api/loop" hx-swap="none" class="btn-sm" onclick="toast('Loop toggled')">Loop</button>
            <button onclick="document.getElementById('settings-modal').showModal()" class="btn-sm btn-icon">&#9881;</button>
        </nav>
    </header>

    <section class="activity-bar" id="activity-bar"
             hx-get="/api/activity" hx-trigger="load, every 2s" hx-swap="innerHTML">
    </section>

    <main>
        <div style="display:flex;align-items:center;gap:0.4rem;padding:0.25rem 0.75rem;">
            <label style="color:var(--text-ghost);font-size:0.7rem;">System:</label>
            <select id="system-selector" onchange="switchSystem(this.value)" style="background:#131820;color:var(--text-primary);border:1px solid #1C2333;border-radius:4px;padding:0.15rem 0.4rem;font-size:0.7rem;font-family:'JetBrains Mono',monospace;">
                <option value="">All Time</option>
                <option value="v2" selected>New System (v2)</option>
            </select>
            <span id="system-since-label" style="color:var(--text-ghost);font-size:0.6rem;"></span>
        </div>

        <section class="stats-grid" id="stats-grid">
        </section>

        <!-- 5 Accordion Sections -->
        <section class="accordion" id="acc-pnl">
            <div class="accordion-header" onclick="toggleAccordion('pnl')">
                <span class="accordion-title">PnL Chart</span>
                <span class="accordion-badge" id="badge-pnl"></span>
                <span class="accordion-arrow" id="arrow-pnl">&#9654;</span>
            </div>
            <div class="accordion-body" id="body-pnl">
                <div>
                    <div class="accordion-content">
                        <canvas id="pnl-chart" style="height:200px;"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <section class="accordion" id="acc-trades">
            <div class="accordion-header" onclick="toggleAccordion('trades')">
                <span class="accordion-title">Trades</span>
                <span class="accordion-badge" id="badge-trades"></span>
                <span class="accordion-arrow" id="arrow-trades">&#9654;</span>
            </div>
            <div class="accordion-body" id="body-trades">
                <div>
                    <div style="display:flex;gap:0.25rem;padding:0.25rem 0.5rem;">
                        <button class="btn-sm trade-filter active" onclick="switchTradeFilter('open')">Open</button>
                        <button class="btn-sm trade-filter" onclick="switchTradeFilter('settled')">Closed</button>
                        <button class="btn-sm trade-filter" onclick="switchTradeFilter('exited')">Exited</button>
                    </div>
                    <div class="accordion-content">
                        <div id="trades-list"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="accordion" id="acc-markets">
            <div class="accordion-header" onclick="toggleAccordion('markets')">
                <span class="accordion-title">Flagged Markets</span>
                <span class="accordion-badge" id="badge-markets"></span>
                <span class="accordion-arrow" id="arrow-markets">&#9654;</span>
            </div>
            <div class="accordion-body" id="body-markets">
                <div>
                    <div class="accordion-content">
                        <div id="markets-list"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="accordion" id="acc-feed">
            <div class="accordion-header" onclick="toggleAccordion('feed')">
                <span class="accordion-title">Live Feed</span>
                <span class="accordion-badge" id="badge-feed"></span>
                <span class="accordion-arrow" id="arrow-feed">&#9654;</span>
            </div>
            <div class="accordion-body" id="body-feed">
                <div>
                    <div class="accordion-content">
                        <div id="log-feed" class="log-feed" hx-get="/api/logs" hx-trigger="load, every 5s" hx-swap="innerHTML"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="accordion" id="acc-lessons">
            <div class="accordion-header" onclick="toggleAccordion('lessons')">
                <span class="accordion-title">Lessons</span>
                <span class="accordion-badge" id="badge-lessons"></span>
                <span class="accordion-arrow" id="arrow-lessons">&#9654;</span>
            </div>
            <div class="accordion-body" id="body-lessons">
                <div>
                    <div class="accordion-content">
                        <div id="lessons-list" hx-get="/api/lessons" hx-trigger="load, every 30s" hx-swap="innerHTML"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <dialog id="settings-modal">
        <h2>Settings</h2>
        <button hx-post="/api/retrain" hx-swap="none" class="btn-retrain" onclick="toast('Retrain triggered')">Retrain Model</button>
        <p class="muted">In-memory only. Restart resets to .env values.</p>
        <form id="settings-form">
            <label>BANKROLL <input type="number" name="BANKROLL" step="any"></label>
            <label>MAX_BET_FRACTION <input type="number" name="MAX_BET_FRACTION" step="0.01"></label>
            <label>CONFIDENCE_THRESHOLD <input type="number" name="CONFIDENCE_THRESHOLD" step="0.01"></label>
            <label>MIN_EDGE_THRESHOLD <input type="number" name="MIN_EDGE_THRESHOLD" step="0.01"></label>
            <label>MAX_DAILY_LOSS <input type="number" name="MAX_DAILY_LOSS" step="any"></label>
            <label>LOOP_INTERVAL <input type="number" name="LOOP_INTERVAL" step="1"></label>
        </form>
        <button onclick="document.getElementById('settings-modal').close()" class="btn-close">Close</button>
    </dialog>

    <script>
    /* ── Dedupe: skip DOM updates when data hasn't changed ── */
    var _lastResponse = {};
    function unchanged(key, text) {
        if (_lastResponse[key] === text) return true;
        _lastResponse[key] = text;
        return false;
    }

    /* ── Utilities ── */
    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function toast(msg) {
        const el = document.createElement('div');
        el.className = 'toast';
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }

    function logClass(line) {
        if (line.includes('[ERROR]')) return 'log-line log-error';
        if (line.includes('[WARNING]')) return 'log-line log-warning';
        if (line.includes('[BLOCKED]')) return 'log-line log-blocked';
        return 'log-line';
    }

    /* ── Accordion ── */
    const ACCORDION_KEY = 'mobile-accordion-state';
    const DEFAULT_STATE = { pnl: true, trades: false, markets: false, feed: false, lessons: false };

    function getAccordionState() {
        try {
            return JSON.parse(localStorage.getItem(ACCORDION_KEY)) || DEFAULT_STATE;
        } catch { return DEFAULT_STATE; }
    }

    function saveAccordionState(state) {
        localStorage.setItem(ACCORDION_KEY, JSON.stringify(state));
    }

    function toggleAccordion(id) {
        const state = getAccordionState();
        state[id] = !state[id];
        saveAccordionState(state);
        applyAccordionState();
        if (id === 'pnl' && state[id] && pnlChart) {
            setTimeout(() => pnlChart.resize(), 350);
        }
    }

    function applyAccordionState() {
        const state = getAccordionState();
        for (const [id, open] of Object.entries(state)) {
            const body = document.getElementById('body-' + id);
            const arrow = document.getElementById('arrow-' + id);
            if (body) {
                body.classList.toggle('open', open);
                if (arrow) arrow.textContent = open ? '\u25BC' : '\u25B6';
            }
        }
    }
    applyAccordionState();

    /* ── System version selector ── */
    const SYSTEM_V2_SINCE = '2026-03-19 15:29:00';
    let _systemSince = SYSTEM_V2_SINCE;
    let _tradeFilter = 'open';

    function switchSystem(val) {
        _systemSince = val === 'v2' ? SYSTEM_V2_SINCE : null;
        const label = document.getElementById('system-since-label');
        label.textContent = _systemSince ? '(since ' + SYSTEM_V2_SINCE.slice(5,16) + ')' : '';
        _lastResponse = {};
        loadStats();
        loadTrades(1);
        refreshChart();
    }

    function sinceParam() {
        return _systemSince ? 'since=' + encodeURIComponent(_systemSince) : '';
    }

    // Init label
    document.addEventListener('DOMContentLoaded', function() {
        var label = document.getElementById('system-since-label');
        if (label && _systemSince) label.textContent = '(since ' + SYSTEM_V2_SINCE.slice(5,16) + ')';
    });

    const isSettled = s => ['dry_run_settled', 'settled', 'dry_run_exited', 'exited'].includes(s);
    const isExited = s => ['dry_run_exited', 'exited'].includes(s);
    const isResolved = s => ['dry_run_settled', 'settled'].includes(s);

    function switchTradeFilter(filter) {
        _tradeFilter = filter;
        document.querySelectorAll('.trade-filter').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().startsWith(filter)));
        renderFilteredTrades();
    }

    /* ── PnL Chart ── */
    let pnlChart = null;
    async function refreshChart() {
        const sp = sinceParam();
        const resp = await fetch('/api/pnl-history' + (sp ? '?' + sp : ''));
        const data = await resp.json();
        const labels = data.map(function(d) { return d.date; });
        const total = data.map(function(d) { return d.total_pnl; });
        const canvas = document.getElementById('pnl-chart');
        if (!canvas) return;

        if (!pnlChart) {
            var ctx = canvas.getContext('2d');
            var gradientTotal = ctx.createLinearGradient(0, 0, 0, 200);
            gradientTotal.addColorStop(0, 'rgba(245, 158, 11, 0.12)');
            gradientTotal.addColorStop(0.6, 'rgba(245, 158, 11, 0.02)');
            gradientTotal.addColorStop(1, 'rgba(245, 158, 11, 0)');

            pnlChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Total PnL (closed + unrealised)',
                            data: total,
                            borderColor: '#F59E0B',
                            borderWidth: 1.5,
                            backgroundColor: gradientTotal,
                            fill: true,
                            tension: 0.35,
                            pointRadius: 0,
                            pointHoverRadius: 4,
                            pointHoverBackgroundColor: '#F59E0B',
                            pointHoverBorderColor: '#0B0E14',
                            pointHoverBorderWidth: 2,
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            align: 'end',
                            labels: {
                                boxWidth: 12, boxHeight: 2, padding: 6,
                                font: { family: 'JetBrains Mono', size: 8 },
                                color: '#566175',
                            }
                        },
                        tooltip: {
                            backgroundColor: '#131820',
                            borderColor: '#1C2333',
                            borderWidth: 1,
                            titleFont: { family: 'Bricolage Grotesque', size: 10, weight: '600' },
                            bodyFont: { family: 'JetBrains Mono', size: 11, weight: '500' },
                            titleColor: '#566175',
                            bodyColor: '#E6EDF3',
                            padding: { x: 8, y: 6 },
                            cornerRadius: 4,
                            displayColors: true,
                            callbacks: {
                                label: function(ctx) { return ' ' + ctx.dataset.label + ': $' + ctx.parsed.y.toFixed(2); }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(28, 35, 51, 0.5)', drawTicks: false },
                            ticks: { font: { family: 'JetBrains Mono', size: 8 }, color: '#2E3848', maxRotation: 0, maxTicksLimit: 4 },
                            border: { display: false },
                        },
                        y: {
                            grid: { color: 'rgba(28, 35, 51, 0.5)', drawTicks: false },
                            ticks: { font: { family: 'JetBrains Mono', size: 8 }, color: '#2E3848', callback: function(v) { return '$' + v; } },
                            border: { display: false },
                        }
                    },
                    layout: { padding: { top: 2 } }
                }
            });
        } else {
            pnlChart.data.labels = labels;
            pnlChart.data.datasets[0].data = total;
            pnlChart.update('none');
        }
    }
    refreshChart();
    setInterval(refreshChart, 30000);

    /* ── Unrealised PnL calc ── */
    function calcUnrealisedPnl(side, amount, entryPrice, currentPrice) {
        if (entryPrice <= 0 || entryPrice >= 1 || currentPrice == null) return null;
        var fee = amount * 0.02;
        if (side === 'YES') {
            var shares = amount / entryPrice;
            return shares * currentPrice - amount - fee;
        } else {
            var noPrice = 1.0 - entryPrice;
            var shares2 = amount / noPrice;
            var curNo = 1.0 - currentPrice;
            return shares2 * curNo - amount - fee;
        }
    }

    /* ── Trades ── */
    let _allTrades = [];

    async function loadTrades() {
        const sp = sinceParam();
        const resp = await fetch('/api/trades?page=1&per_page=200' + (sp ? '&' + sp : ''));
        var text = await resp.text();
        if (unchanged('trades-all', text)) return;
        const data = JSON.parse(text);
        _allTrades = data.items || [];
        const badge = document.getElementById('badge-trades');
        if (badge) badge.textContent = _allTrades.length + ' trades';
        renderFilteredTrades();
    }

    function renderFilteredTrades() {
        let items;
        if (_tradeFilter === 'settled') items = _allTrades.filter(t => isResolved(t.status));
        else if (_tradeFilter === 'exited') items = _allTrades.filter(t => isExited(t.status));
        else items = _allTrades.filter(t => !isSettled(t.status));

        const el = document.getElementById('trades-list');
        if (!el) return;
        if (items.length === 0) { el.innerHTML = '<p class="muted">No ' + _tradeFilter + ' trades.</p>'; return; }

        // Sort by PnL descending for closed/exited, by date for open
        if (_tradeFilter !== 'open') {
            items.sort((a, b) => {
                var pa = a.pnl || a.hypothetical_pnl || 0;
                var pb = b.pnl || b.hypothetical_pnl || 0;
                return pb - pa;
            });
        }

        const exitReasons = {stop_loss:'STOP LOSS',negative_edge:'EDGE GONE',profit_lock:'PROFIT LOCK',stale_position:'STALE'};
        let html = '';
        items.forEach(function(t) {
            var nameText = esc(t.question || t.market_id || '');
            var name = t.slug ? '<a href="https://polymarket.com/event/' + esc(t.slug) + '" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">' + nameText + '</a>' : nameText;
            var sideCls = t.side === 'YES' ? 'side-yes' : 'side-no';
            var tIsOpen = !isSettled(t.status);

            // PnL
            var pnl = null, pnlLabel = '';
            if (tIsOpen && t.current_price != null && t.current_price > 0) {
                pnl = calcUnrealisedPnl(t.side, t.amount, t.price, t.current_price);
                pnlLabel = ' ur';
            } else {
                pnl = t.pnl != null ? t.pnl : (t.hypothetical_pnl != null ? t.hypothetical_pnl : null);
            }
            var pnlStr = pnl !== null ? (pnl >= 0 ? '+' : '-') + '$' + Math.abs(pnl).toFixed(2) + pnlLabel : '\u2014';
            var pnlCls = pnl !== null ? (pnl >= 0 ? 'pnl-pos' : 'pnl-neg') : 'pnl-na';

            // Status line
            var statusHtml = '';
            if (t.exit_reason) {
                statusHtml = '<span style="color:var(--amber);font-size:0.65rem;">' + (exitReasons[t.exit_reason] || t.exit_reason) + '</span>';
            } else if (t.resolved_outcome) {
                var won = t.side === t.resolved_outcome;
                statusHtml = '<span style="color:' + (won ? 'var(--neon)' : 'var(--red)') + ';font-weight:600;font-size:0.7rem;">' + (won ? 'WIN' : 'LOSS') + '</span>';
            } else if (tIsOpen && t.current_price != null) {
                statusHtml = '<span style="color:var(--text-ghost);font-size:0.65rem;">' + t.current_price.toFixed(2) + '</span>';
            }

            // Date
            var dateStr = t.executed_at ? t.executed_at.slice(5,16).replace('T',' ') : '';

            html += '<div class="trade-card">' +
                '<div class="trade-card-question">' + name + '</div>' +
                '<div class="trade-card-row">' +
                    '<span class="side-badge ' + sideCls + '">' + esc(t.side) + '</span>' +
                    '<span class="trade-amount">$' + t.amount.toFixed(0) + ' @ ' + t.price.toFixed(2) + '</span>' +
                    statusHtml +
                    '<span class="trade-pnl ' + pnlCls + '">' + pnlStr + '</span>' +
                '</div>' +
                '<div style="color:var(--text-ghost);font-size:0.6rem;padding:0 0.5rem 0.25rem;">' + dateStr + '</div>' +
                '</div>';
        });
        el.innerHTML = html;
    }

    loadTrades();
    setInterval(loadTrades, 10000);

    /* ── Markets ── */
    let marketsPage = 1;
    const MARKETS_PER_PAGE = 20;

    async function loadMarkets(page) {
        marketsPage = page || 1;
        const resp = await fetch('/api/markets?page=' + marketsPage + '&per_page=' + MARKETS_PER_PAGE);
        var text = await resp.text();
        if (unchanged('markets-' + marketsPage, text)) return;
        const data = JSON.parse(text);
        const el = document.getElementById('markets-list');
        if (!el) return;

        const badge = document.getElementById('badge-markets');
        if (badge) badge.textContent = data.total + ' flagged';

        if (data.total === 0) { el.innerHTML = '<p class="muted">No flagged markets.</p>'; return; }

        let html = '';
        data.items.forEach(m => {
            const price = m.yes_price.toFixed(2);
            const priceCls = m.yes_price > 0.7 ? 'price-high' : m.yes_price < 0.3 ? 'price-low' : 'price-mid';
            let resultHtml = '';
            if (m.trade_status) {
                resultHtml = '<span class="result-traded">' + esc(m.recommended_side) + ' $' + m.trade_amount.toFixed(0) + '</span>';
            } else if (m.approved === 0 && m.rejection_reason) {
                resultHtml = '<span class="result-rejected">' + esc(m.rejection_reason) + '</span>';
            } else if (m.recommended_side) {
                resultHtml = '<span class="result-pending">' + esc(m.recommended_side) + '</span>';
            } else {
                resultHtml = '<span class="result-none">Not evaluated</span>';
            }
            const edgeHtml = m.edge != null
                ? '<span class="edge-value">' + (m.edge * 100).toFixed(1) + '%</span>'
                : '<span class="edge-na">\u2014</span>';

            var mName = m.slug
                ? '<a href="https://polymarket.com/event/' + esc(m.slug) + '" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">' + esc(m.question || '') + '</a>'
                : esc(m.question || '');
            html += '<div class="market-card">' +
                '<div class="market-card-question">' + mName + '</div>' +
                '<div class="market-card-row">' +
                    '<span class="yes-price ' + priceCls + '">' + price + '</span>' +
                    resultHtml + edgeHtml +
                '</div></div>';
        });

        const totalPages = Math.ceil(data.total / MARKETS_PER_PAGE);
        if (totalPages > 1) {
            html += '<div class="pager">' +
                '<button class="pager-btn" ' + (marketsPage <= 1 ? 'disabled' : '') + ' onclick="loadMarkets(' + (marketsPage - 1) + ')">&laquo;</button>' +
                '<span class="pager-info">' + marketsPage + ' / ' + totalPages + '</span>' +
                '<button class="pager-btn" ' + (marketsPage >= totalPages ? 'disabled' : '') + ' onclick="loadMarkets(' + (marketsPage + 1) + ')">&raquo;</button>' +
                '</div>';
        }
        el.innerHTML = html;
    }
    loadMarkets();
    setInterval(function() { loadMarkets(marketsPage); }, 10000);

    /* ── HTMX Formatters ── */
    let latestStats = {};

    htmx.on('htmx:beforeSwap', function(evt) {
        var key = evt.detail.target.id || evt.detail.target.className;
        if (unchanged('htmx-' + key, evt.detail.xhr.responseText)) {
            evt.detail.shouldSwap = false;
            return;
        }

        /* Status badge */
        if (evt.detail.target.id === 'status-badge') {
            const d = JSON.parse(evt.detail.xhr.responseText);
            const mode = d.dry_run ? 'DRY RUN' : 'LIVE';
            const cls = d.dry_run ? 'badge-dry' : 'badge-live';
            const loop = d.loop_active ? '<span class="tag-loop">LOOP</span>' : '';
            const scan = d.scanning ? '<span class="tag-scan">SCANNING</span>' : '';
            evt.detail.serverResponse =
                '<span class="badge ' + cls + '">' + mode + '</span>' + loop + scan +
                (d.last_error ? '<span class="tag-err">ERR</span>' : '');
        }

        /* Stats grid — handled by loadStats(), skip htmx */
        if (evt.detail.target.id === 'stats-grid') {
            evt.detail.shouldSwap = false;
            return;
        }

        /* Log feed */
        if (evt.detail.target.id === 'log-feed') {
            const logs = JSON.parse(evt.detail.xhr.responseText);
            if (logs.length === 0) {
                evt.detail.serverResponse = '<p class="muted">No logs yet.</p>';
            } else {
                evt.detail.serverResponse = logs.map(function(l) {
                    return '<div class="' + logClass(l) + '">' + esc(l) + '</div>';
                }).join('');
            }
        }

        /* Lessons */
        if (evt.detail.target.id === 'lessons-list') {
            const lessons = JSON.parse(evt.detail.xhr.responseText);
            const badge = document.getElementById('badge-lessons');
            if (badge) badge.textContent = lessons.length + ' lessons';
            if (lessons.length === 0) {
                evt.detail.serverResponse = '<p class="muted">No lessons yet.</p>';
            } else {
                evt.detail.serverResponse = '<ul>' + lessons.map(function(l) {
                    return '<li><strong>' + esc(l.category) + '</strong> ' + esc(l.lesson) + '</li>';
                }).join('') + '</ul>';
            }
        }
    });

    /* ── Settings ── */
    document.getElementById('settings-form').addEventListener('change', async function(e) {
        const key = e.target.name;
        const value = parseFloat(e.target.value);
        const resp = await fetch('/api/settings', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({key: key, value: value})
        });
        const result = await resp.json();
        if (!result.ok) toast('Error: ' + result.error);
        else toast(key + ' updated');
    });

    /* ── Stats (JS fetch with since) ── */
    async function loadStats() {
        const sp = sinceParam();
        const resp = await fetch('/api/stats' + (sp ? '?' + sp : ''));
        var text = await resp.text();
        if (unchanged('stats-js', text)) return;
        const s = JSON.parse(text);
        latestStats = s;
        const pnlColor = s.total_pnl >= 0 ? 'var(--neon)' : 'var(--red)';
        const pnlSign = s.total_pnl >= 0 ? '+' : '';
        const accStr = s.prediction_accuracy && s.prediction_accuracy.evaluated > 0
            ? (s.prediction_accuracy.accuracy * 100).toFixed(0) + '%' : '\u2014';
        var totalPnl = s.total_pnl + (s.unrealised_pnl || 0);
        var totalPnlColor = totalPnl >= 0 ? 'var(--neon)' : 'var(--red)';
        var totalPnlSign = totalPnl >= 0 ? '+' : '-';
        var urSign = (s.unrealised_pnl || 0) >= 0 ? '+' : '-';
        document.getElementById('stats-grid').innerHTML =
            '<div class="stats-top">' +
                '<div class="stat-card"><div class="stat-label">Trades</div><div class="stat-value">' + s.total_trades + '</div></div>' +
                '<div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value pending">' + (s.dry_run_pending || 0) + '</div></div>' +
                '<div class="stat-card"><div class="stat-label">Win Rate</div><div class="stat-value">' + (s.win_rate * 100).toFixed(0) + '%</div></div>' +
                '<div class="stat-card"><div class="stat-label">Total PnL</div><div class="stat-value" style="color:' + totalPnlColor + '">' + totalPnlSign + '$' + Math.abs(totalPnl).toFixed(2) + '</div></div>' +
            '</div>' +
            '<div class="stats-more-toggle" onclick="this.nextElementSibling.classList.toggle(\'open\');this.textContent=this.nextElementSibling.classList.contains(\'open\')?\'&#9650; less stats\':\'&#9660; more stats\'">&#9660; more stats</div>' +
            '<div class="stats-more">' +
                '<div class="stat-card"><div class="stat-label">Closed PnL</div><div class="stat-value" style="color:' + pnlColor + '">' + pnlSign + '$' + Math.abs(s.total_pnl).toFixed(2) + '</div></div>' +
                '<div class="stat-card"><div class="stat-label">Unrealised</div><div class="stat-value" style="color:' + ((s.unrealised_pnl || 0) >= 0 ? 'var(--neon)' : 'var(--red)') + '">' + urSign + '$' + Math.abs(s.unrealised_pnl || 0).toFixed(2) + '</div></div>' +
                '<div class="stat-card"><div class="stat-label">Predictions</div><div class="stat-value">' + (s.total_predictions || 0) + '</div></div>' +
                '<div class="stat-card"><div class="stat-label">Accuracy</div><div class="stat-value" style="color:' + (accStr !== '\u2014' ? 'var(--neon)' : 'var(--text-ghost)') + '">' + accStr + '</div></div>' +
            '</div>';
    }
    loadStats();
    setInterval(loadStats, 10000);

    /* ── Visibility change: refresh when returning to tab ── */
    document.addEventListener('visibilitychange', function() {
        if (!document.hidden) {
            htmx.trigger(document.getElementById('activity-bar'), 'load');
            loadStats();
            loadTrades();
            loadMarkets(marketsPage);
            refreshChart();
        }
    });
    </script>
</body>
</html>
