<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto 5-Min — Polymarket Bot</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
</head>
<body>
<nav style="display:flex;gap:1.5rem;padding:0.75rem 1.5rem;background:#1a1a2e;border-bottom:1px solid #333;font-size:0.9rem;">
  <a href="/" style="color:#8B95A5;text-decoration:none;font-weight:600;">Event Markets</a>
  <a href="/crypto" style="color:#f0c040;text-decoration:none;font-weight:700;">Crypto 5-Min</a>
</nav>

<header>
    <h1>Crypto 5-Min</h1>
    <div id="status-badge"><span class="badge badge-dry">DRY RUN</span></div>
    <nav>
        <select id="strategy-select" class="btn" style="appearance:auto;padding-right:1.5rem">
            <option value="">Loading...</option>
        </select>
        <button class="btn" onclick="applyStrategy()">Apply</button>
        <span style="color:var(--border);margin:0 0.15rem">|</span>
        <select id="candle-select" class="btn" style="appearance:auto;padding-right:1.5rem">
            <option value="1000">1K candles</option>
            <option value="2000">2K candles</option>
            <option value="5000" selected>5K candles</option>
            <option value="10000">10K candles</option>
        </select>
        <button class="btn" id="backtest-btn" onclick="runBacktest()">Backtest</button>
    </nav>
</header>

<main>
    <section class="stats-row" id="crypto-stats"
             hx-get="/api/crypto/stats" hx-trigger="load, every 10s" hx-swap="innerHTML">
    </section>

    <div class="grid">
        <!-- Left top: Trades -->
        <section class="card">
            <h2>Trades <span class="trade-tabs">
                <button class="trade-tab active" onclick="switchTradeTab('open')">Open</button>
                <button class="trade-tab" onclick="switchTradeTab('settled')">Closed</button>
            </span></h2>
            <div id="trades-table"></div>
        </section>

        <!-- Right top: Chart -->
        <section class="card chart-card">
            <h2>Cumulative P&amp;L</h2>
            <canvas id="pnl-chart"></canvas>
        </section>

        <!-- Left bottom: Strategy Comparison -->
        <section class="card">
            <h2>Strategy Comparison</h2>
            <div id="crypto-strategies"></div>
        </section>

        <!-- Right bottom: Incubation + Backtests stacked -->
        <div class="split-col">
            <section class="card">
                <h2>Incubation</h2>
                <div id="crypto-incubation"></div>
            </section>
            <section class="card">
                <h2>Backtests <span class="trade-tabs" id="backtest-filters"></span></h2>
                <div id="crypto-backtests"></div>
            </section>
        </div>
    </div>
</main>

<script>
/* ── Helpers ── */
function esc(s) {
    const d = document.createElement('div');
    d.textContent = String(s ?? '');
    return d.innerHTML;
}

/* ── Stats bar (htmx beforeSwap) ── */
htmx.on('htmx:beforeSwap', function(evt) {
    if (!evt.detail.target.classList.contains('stats-row')) return;
    let s;
    try { s = JSON.parse(evt.detail.xhr.responseText); } catch { return; }

    const totalTrades = s.total_trades ?? 0;
    const open        = (s.total_trades ?? 0) - (s.settled ?? 0);
    const wins        = s.wins ?? 0;
    const settled     = s.settled ?? 0;
    const winRate     = s.win_rate ?? 0;
    const todayPnl    = s.today_pnl ?? 0;
    const totalPnl    = s.total_pnl ?? 0;
    const bankroll    = s.bankroll ?? 0;

    const todayColor  = todayPnl >= 0 ? 'var(--neon)' : 'var(--red)';
    const totalColor  = totalPnl >= 0 ? 'var(--neon)' : 'var(--red)';
    const todaySign   = todayPnl >= 0 ? '+' : '';
    const totalSign   = totalPnl >= 0 ? '+' : '';

    evt.detail.serverResponse = `
        <div class="stat-card">
            <div class="stat-value">${totalTrades}</div>
            <div class="stat-label">Total Trades</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">${open}</div>
            <div class="stat-label">Open</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">${(winRate * 100).toFixed(0)}%</div>
            <div class="stat-label">Win Rate (${wins}/${settled})</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" style="color:${todayColor}">${todaySign}$${Math.abs(todayPnl).toFixed(2)}</div>
            <div class="stat-label">Today P&amp;L</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" style="color:${totalColor}">${totalSign}$${Math.abs(totalPnl).toFixed(2)}</div>
            <div class="stat-label">Total P&amp;L</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" style="color:var(--amber)">$${bankroll.toFixed(2)}</div>
            <div class="stat-label">Bankroll</div>
        </div>`;
});

/* ── Trade tabs ── */
let _tradeTab = 'open';
let _tradesData = [];

function switchTradeTab(tab) {
    _tradeTab = tab;
    document.querySelectorAll('.trade-tab').forEach(b =>
        b.classList.toggle('active', b.textContent.toLowerCase() === tab)
    );
    renderTrades();
}

const isOpen     = s => s === 'dry_run_open' || s === 'open';
const isSettled  = s => s === 'dry_run_won' || s === 'dry_run_lost' || s === 'won' || s === 'lost';

function renderTrades() {
    const el = document.getElementById('trades-table');
    if (!el) return;
    if (_tradesData.length === 0) { el.innerHTML = '<p class="muted">No trades yet.</p>'; return; }

    const items = _tradesData.filter(t =>
        _tradeTab === 'open' ? isOpen(t.status) : isSettled(t.status)
    );
    if (items.length === 0) {
        el.innerHTML = `<p class="muted">No ${_tradeTab} trades.</p>`;
        return;
    }

    /* Column headers differ between tabs */
    const headerHtml = _tradeTab === 'open'
        ? '<th>Market</th><th>Side</th><th>Amount</th><th>Entry</th><th>BTC Start</th><th>P&amp;L</th>'
        : '<th>Market</th><th>Side</th><th>Amount</th><th>Entry</th><th>BTC Start</th><th>Outcome</th><th>P&amp;L</th>';

    let html = `<div class="table-scroll"><table class="trades-tbl"><tr>${headerHtml}</tr>`;

    items.forEach(t => {
        const nameText  = esc(t.strategy || t.symbol || '—');
        const sideStyle = t.side === 'Up' ? 'color:var(--neon)' : 'color:var(--red)';
        const amtStr    = '$' + (t.amount || 0).toFixed(2);
        const entryStr  = t.entry_price != null ? t.entry_price.toFixed(3) : '—';
        const btcStr    = t.btc_price_at_entry != null
            ? '$' + t.btc_price_at_entry.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})
            : '—';

        /* P&L */
        const pnl      = t.pnl;
        const pnlStr   = pnl != null
            ? (pnl >= 0 ? '+' : '') + '$' + Math.abs(pnl).toFixed(2)
            : '—';
        const pnlStyle = pnl != null
            ? (pnl >= 0 ? 'color:var(--neon);font-weight:600' : 'color:var(--red);font-weight:600')
            : 'color:var(--text-ghost)';

        if (_tradeTab === 'open') {
            html += `<tr>
                <td class="td-market">${nameText}</td>
                <td style="${sideStyle};font-weight:600">${esc(t.side || '—')}</td>
                <td>${amtStr}</td>
                <td>${entryStr}</td>
                <td style="color:var(--text-dim)">${btcStr}</td>
                <td style="${pnlStyle}">${pnlStr}</td>
            </tr>`;
        } else {
            /* Outcome: did the trade win? Up side wins if won, Down side wins if won */
            const won    = t.status === 'won' || t.status === 'dry_run_won';
            const outcomeStr   = won
                ? (t.side === 'Up' ? 'Up ✓' : 'Down ✓')
                : (t.side === 'Up' ? 'Down ✗' : 'Up ✗');
            const outcomeStyle = won ? 'color:var(--neon);font-weight:600' : 'color:var(--red);font-weight:600';

            html += `<tr>
                <td class="td-market">${nameText}</td>
                <td style="${sideStyle};font-weight:600">${esc(t.side || '—')}</td>
                <td>${amtStr}</td>
                <td>${entryStr}</td>
                <td style="color:var(--text-dim)">${btcStr}</td>
                <td style="${outcomeStyle}">${outcomeStr}</td>
                <td style="${pnlStyle}">${pnlStr}</td>
            </tr>`;
        }
    });

    html += '</table></div>';
    el.innerHTML = html;
}

async function loadTrades() {
    try {
        const resp = await fetch('/api/crypto/trades?page=1&per_page=200');
        const data = await resp.json();
        _tradesData = data.items || [];
        renderTrades();
    } catch { /* silent */ }
}
loadTrades();
setInterval(loadTrades, 10000);

/* ── PnL Chart ── */
let cryptoChart = null;

async function refreshChart() {
    let data;
    try {
        const resp = await fetch('/api/crypto/pnl-history');
        data = await resp.json();
    } catch { return; }
    if (!Array.isArray(data) || data.length === 0) return;

    const labels = data.map(d => d.date || d.time || d.label || '');
    const values = data.map(d => d.cumulative_pnl ?? d.pnl ?? 0);
    const canvas = document.getElementById('pnl-chart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    if (cryptoChart) { cryptoChart.destroy(); cryptoChart = null; }

    const grad = ctx.createLinearGradient(0, 0, 0, 180);
    grad.addColorStop(0,   'rgba(245, 158, 11, 0.12)');
    grad.addColorStop(0.6, 'rgba(245, 158, 11, 0.02)');
    grad.addColorStop(1,   'rgba(245, 158, 11, 0)');

    cryptoChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [{
                label: 'Cumulative P&L',
                data: values,
                borderColor: '#F59E0B',
                borderWidth: 1.5,
                backgroundColor: grad,
                fill: true,
                tension: 0.35,
                pointRadius: 4,
                pointBackgroundColor: '#F59E0B',
                pointBorderColor: '#0B0E14',
                pointBorderWidth: 2,
                pointHoverRadius: 4,
                pointHoverBackgroundColor: '#F59E0B',
                pointHoverBorderColor: '#0B0E14',
                pointHoverBorderWidth: 2,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            plugins: {
                legend: {
                    display: true, position: 'top', align: 'end',
                    labels: { boxWidth: 12, boxHeight: 2, padding: 8, font: { family: 'JetBrains Mono', size: 9 }, color: '#566175' }
                },
                tooltip: {
                    backgroundColor: '#131820', borderColor: '#1C2333', borderWidth: 1,
                    titleFont: { family: 'Bricolage Grotesque', size: 10, weight: '600' },
                    bodyFont: { family: 'JetBrains Mono', size: 11, weight: '500' },
                    titleColor: '#566175', bodyColor: '#E6EDF3',
                    padding: { x: 8, y: 6 }, cornerRadius: 4, displayColors: true,
                    callbacks: { label: ctx => ` ${ctx.dataset.label}: $${ctx.parsed.y.toFixed(2)}` }
                }
            },
            scales: {
                x: {
                    grid: { color: 'rgba(28, 35, 51, 0.5)', drawTicks: false },
                    ticks: { font: { family: 'JetBrains Mono', size: 9 }, color: '#2E3848', maxRotation: 0, maxTicksLimit: 6 },
                    border: { display: false }
                },
                y: {
                    grid: { color: 'rgba(28, 35, 51, 0.5)', drawTicks: false },
                    ticks: { font: { family: 'JetBrains Mono', size: 9 }, color: '#2E3848', callback: v => '$' + v },
                    border: { display: false }
                }
            },
            layout: { padding: { top: 2 } }
        }
    });
}
refreshChart();
setInterval(refreshChart, 30000);

/* ── Strategy Comparison ── */
async function loadStrategies() {
    try {
        const resp = await fetch('/api/crypto/strategies');
        const items = await resp.json();
        const el = document.getElementById('crypto-strategies');
        if (!el) return;
        if (!items || items.length === 0) {
            el.innerHTML = '<p class="muted">No active strategies.</p>';
            return;
        }
        let html = '<div class="table-scroll"><table><tr><th>Strategy</th><th>Trades</th><th>Win%</th><th>P&amp;L</th></tr>';
        items.forEach(s => {
            const wrStr  = s.win_rate != null ? (s.win_rate * 100).toFixed(0) + '%' : '—';
            const pnl    = s.total_pnl ?? null;
            const pnlStr = pnl != null ? (pnl >= 0 ? '+' : '') + '$' + Math.abs(pnl).toFixed(2) : '—';
            const pnlStyle = pnl != null ? (pnl >= 0 ? 'color:var(--neon);font-weight:600' : 'color:var(--red);font-weight:600') : 'color:var(--text-ghost)';
            html += `<tr>
                <td style="font-weight:500">${esc(s.strategy || '—')}</td>
                <td style="color:var(--text-dim)">${s.total_trades ?? 0}</td>
                <td style="color:var(--text-secondary)">${wrStr}</td>
                <td style="${pnlStyle}">${pnlStr}</td>
            </tr>`;
        });
        html += '</table></div>';
        el.innerHTML = html;
    } catch { /* silent */ }
}
loadStrategies();
setInterval(loadStrategies, 30000);

/* ── Incubation ── */
async function loadIncubation() {
    try {
        const resp = await fetch('/api/crypto/incubation');
        const items = await resp.json();
        const el = document.getElementById('crypto-incubation');
        if (!el) return;
        if (!items || items.length === 0) {
            el.innerHTML = '<p class="muted">No strategies in incubation.</p>';
            return;
        }
        let html = '<div class="table-scroll"><table><tr><th>Strategy</th><th>Size</th><th>Trades</th><th>P&amp;L</th><th>Status</th></tr>';
        items.forEach(s => {
            const pnl      = s.total_pnl ?? null;
            const pnlStr   = pnl != null ? (pnl >= 0 ? '+' : '') + '$' + Math.abs(pnl).toFixed(2) : '—';
            const pnlStyle = pnl != null ? (pnl >= 0 ? 'color:var(--neon);font-weight:600' : 'color:var(--red);font-weight:600') : 'color:var(--text-ghost)';
            const st = s.status || '';
            let pillHtml;
            if (st === 'incubating')
                pillHtml = '<span class="badge badge-dry">INCUBATING</span>';
            else if (st === 'scaled')
                pillHtml = '<span class="badge" style="background:var(--neon-dim);color:var(--neon);border:1px solid rgba(0,230,138,0.2)">SCALED</span>';
            else if (st === 'retired')
                pillHtml = '<span class="badge" style="background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,0.2)">RETIRED</span>';
            else
                pillHtml = `<span class="badge" style="background:var(--surface-raised);color:var(--text-dim);border:1px solid var(--border)">${esc(st)}</span>`;
            html += `<tr>
                <td style="font-weight:500">${esc(s.strategy || '—')}</td>
                <td style="color:var(--text-dim)">$${(s.position_size || 0).toFixed(2)}</td>
                <td style="color:var(--text-dim)">${s.total_trades ?? 0}</td>
                <td style="${pnlStyle}">${pnlStr}</td>
                <td>${pillHtml}</td>
            </tr>`;
        });
        html += '</table></div>';
        el.innerHTML = html;
    } catch { /* silent */ }
}
loadIncubation();
setInterval(loadIncubation, 30000);

/* ── Backtests with filter ── */
let _backtestData = [];
let _backtestFilter = 'all';

function btShortName(b) {
    let name = b.strategy || '—';
    if (b.params) {
        try {
            const p = typeof b.params === 'string' ? JSON.parse(b.params) : b.params;
            let short;
            if (b.strategy === 'macd_hist') short = `${p.macd_fast}/${p.macd_slow}/${p.macd_signal}`;
            else if (b.strategy === 'rsi_bb') short = `${p.rsi_length}/${p.bb_length}/${p.bb_std}`;
            else if (b.strategy === 'ema_cross') short = `${p.ema_fast}/${p.ema_slow}`;
            else if (b.strategy === 'vwap_cap') short = `${p.vol_spike_min}/${p.vwap_revert_pct}`;
            else short = Object.values(p).join('/');
            name += ` (${short})`;
        } catch {}
    }
    return name;
}

function switchBacktestFilter(filter) {
    _backtestFilter = filter;
    document.querySelectorAll('#backtest-filters .trade-tab').forEach(b =>
        b.classList.toggle('active', b.dataset.filter === filter)
    );
    renderBacktests();
}

/* Score = Expectancy × √(Trades) × WinRate — rewards edge, volume, consistency */
function calcScore(b) {
    const exp = b.expectancy ?? 0;
    const trades = b.total_trades ?? 0;
    const wr = b.win_rate ?? 0;
    if (trades === 0 || exp <= 0) return 0;
    return exp * Math.sqrt(trades) * wr;
}

function renderBacktests() {
    const el = document.getElementById('crypto-backtests');
    if (!el) return;
    if (!_backtestData.length) {
        el.innerHTML = '<p class="muted">No backtest results yet.</p>';
        return;
    }
    let items = _backtestFilter === 'all'
        ? [..._backtestData]
        : _backtestData.filter(b => b.strategy === _backtestFilter);
    if (!items.length) {
        el.innerHTML = '<p class="muted">No results for this strategy.</p>';
        return;
    }

    /* Compute scores and rank */
    items.forEach(b => { b._score = calcScore(b); });
    const sorted = [...items].sort((a, b) => b._score - a._score);
    sorted.forEach((b, i) => { b._rank = i + 1; });
    /* Restore original order (by expectancy) but with ranks attached */
    const rankMap = new Map(sorted.map(b => [b, b._rank]));

    let html = '<div class="table-scroll"><table><tr><th>#</th><th>Strategy</th><th>Trades</th><th>Win%</th><th>Avg/Trade</th><th>P&amp;L</th><th>Score</th></tr>';
    items.forEach(b => {
        const rank = rankMap.get(b) ?? '—';
        const wrStr  = b.win_rate != null ? (b.win_rate * 100).toFixed(0) + '%' : '—';
        const expStr = b.expectancy != null ? (b.expectancy >= 0 ? '+' : '') + '$' + Math.abs(b.expectancy).toFixed(2) : '—';
        const expStyle = b.expectancy != null ? (b.expectancy >= 0 ? 'color:var(--neon)' : 'color:var(--red)') : 'color:var(--text-ghost)';
        const pnl    = b.pnl ?? b.total_pnl ?? null;
        const pnlStr = pnl != null ? (pnl >= 0 ? '+' : '') + '$' + Math.abs(pnl).toFixed(2) : '—';
        const pnlStyle = pnl != null ? (pnl >= 0 ? 'color:var(--neon);font-weight:600' : 'color:var(--red);font-weight:600') : 'color:var(--text-ghost)';
        const score = b._score;
        const scoreStr = score > 0 ? score.toFixed(2) : '0';
        const scoreStyle = score > 0 ? 'color:var(--amber);font-weight:700' : 'color:var(--text-ghost)';
        const rankStyle = rank === 1 ? 'color:var(--amber);font-weight:700' : rank <= 3 ? 'color:var(--text-secondary);font-weight:600' : 'color:var(--text-ghost)';
        html += `<tr>
            <td style="${rankStyle}">${rank}</td>
            <td style="font-weight:500">${esc(btShortName(b))}</td>
            <td style="color:var(--text-dim)">${b.total_trades ?? '—'}</td>
            <td style="color:var(--text-secondary)">${wrStr}</td>
            <td style="${expStyle};font-weight:600">${expStr}</td>
            <td style="${pnlStyle}">${pnlStr}</td>
            <td style="${scoreStyle}">${scoreStr}</td>
        </tr>`;
    });
    html += '</table></div>';
    el.innerHTML = html;
}

function buildBacktestFilters() {
    const strategies = [...new Set(_backtestData.map(b => b.strategy))];
    const container = document.getElementById('backtest-filters');
    if (!container) return;
    let html = `<button class="trade-tab ${_backtestFilter === 'all' ? 'active' : ''}" data-filter="all" onclick="switchBacktestFilter('all')">All</button>`;
    strategies.forEach(s => {
        html += `<button class="trade-tab ${_backtestFilter === s ? 'active' : ''}" data-filter="${esc(s)}" onclick="switchBacktestFilter('${esc(s)}')">${esc(s)}</button>`;
    });
    container.innerHTML = html;
}

async function loadBacktests() {
    try {
        const resp = await fetch('/api/crypto/backtests');
        _backtestData = await resp.json();
        if (!_backtestData || !Array.isArray(_backtestData)) _backtestData = [];
        buildBacktestFilters();
        renderBacktests();
    } catch { /* silent */ }
}
loadBacktests();
setInterval(loadBacktests, 30000);

/* ── Strategy selector ── */
const STRATEGY_OPTIONS = [
    { label: 'macd_hist (3/15/3)',    strategy: 'macd_hist', params: '{"macd_fast":3,"macd_slow":15,"macd_signal":3}' },
    { label: 'macd_hist (8/21/5)',    strategy: 'macd_hist', params: '{"macd_fast":8,"macd_slow":21,"macd_signal":5}' },
    { label: 'macd_hist (12/26/9)',   strategy: 'macd_hist', params: '{"macd_fast":12,"macd_slow":26,"macd_signal":9}' },
    { label: 'rsi_bb (7/20/2.0)',     strategy: 'rsi_bb',    params: '{"rsi_length":7,"bb_length":20,"bb_std":2.0,"rsi_oversold":30,"rsi_overbought":70,"squeeze_threshold":0.02}' },
    { label: 'rsi_bb (14/20/2.0)',    strategy: 'rsi_bb',    params: '{"rsi_length":14,"bb_length":20,"bb_std":2.0,"rsi_oversold":25,"rsi_overbought":75,"squeeze_threshold":0.015}' },
    { label: 'ema_cross (5/13)',      strategy: 'ema_cross',  params: '{"ema_fast":5,"ema_slow":13}' },
    { label: 'ema_cross (8/21)',      strategy: 'ema_cross',  params: '{"ema_fast":8,"ema_slow":21}' },
    { label: 'ema_cross (3/10)',      strategy: 'ema_cross',  params: '{"ema_fast":3,"ema_slow":10}' },
    { label: 'vwap_cap (2.0/0.001)',  strategy: 'vwap_cap',   params: '{"vol_spike_min":2.0,"vwap_revert_pct":0.001,"vol_sma_length":20}' },
    { label: 'vwap_cap (3.0/0.0005)', strategy: 'vwap_cap',   params: '{"vol_spike_min":3.0,"vwap_revert_pct":0.0005,"vol_sma_length":20}' },
];

async function loadCurrentConfig() {
    try {
        const resp = await fetch('/api/crypto/current-config');
        const cfg = await resp.json();
        const sel = document.getElementById('strategy-select');
        sel.innerHTML = '';
        STRATEGY_OPTIONS.forEach((opt, i) => {
            const el = document.createElement('option');
            el.value = i;
            el.textContent = opt.label;
            if (opt.strategy === cfg.strategy && opt.params === cfg.params) el.selected = true;
            sel.appendChild(el);
        });
        /* Set candle selector */
        const cSel = document.getElementById('candle-select');
        for (const opt of cSel.options) {
            if (parseInt(opt.value) === cfg.candles) opt.selected = true;
        }
    } catch { /* silent */ }
}
loadCurrentConfig();

async function applyStrategy() {
    const sel = document.getElementById('strategy-select');
    const chosen = STRATEGY_OPTIONS[parseInt(sel.value)];
    if (!chosen) return;
    try {
        const resp = await fetch('/api/crypto/set-strategy', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(chosen),
        });
        const result = await resp.json();
        if (result.restarted) {
            toast('Strategy updated & bot restarted');
        } else {
            toast('Strategy saved — restart bot manually');
        }
    } catch { toast('Failed to update strategy'); }
}

async function runBacktest() {
    const btn = document.getElementById('backtest-btn');
    const candles = parseInt(document.getElementById('candle-select').value);
    btn.textContent = 'Running...';
    btn.disabled = true;
    try {
        const resp = await fetch('/api/crypto/run-backtest', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ candles }),
        });
        const result = await resp.json();
        if (result.status === 'already_running') {
            toast('Backtest already running');
        } else {
            toast(`Backtest started (${candles} candles)`);
            pollBacktest();
        }
    } catch { toast('Failed to start backtest'); }
    finally { btn.disabled = false; btn.textContent = 'Backtest'; }
}

async function pollBacktest() {
    const btn = document.getElementById('backtest-btn');
    const poll = setInterval(async () => {
        try {
            const resp = await fetch('/api/crypto/backtest-status');
            const s = await resp.json();
            if (!s.running) {
                clearInterval(poll);
                btn.textContent = 'Backtest';
                toast('Backtest complete');
                loadBacktests();
            } else {
                btn.textContent = 'Running...';
            }
        } catch { clearInterval(poll); btn.textContent = 'Backtest'; }
    }, 3000);
}

/* ── Toast ── */
function toast(msg) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}
</script>
