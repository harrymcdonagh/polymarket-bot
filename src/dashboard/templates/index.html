<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Bot</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
</head>
<body>
    <header>
        <h1>Polymarket Bot</h1>
        <div id="status-badge" hx-get="/api/status" hx-trigger="load, every 10s"
             hx-swap="innerHTML">Connecting...</div>
        <nav>
            <button hx-post="/api/scan" hx-swap="none" class="btn" onclick="toast('Scan triggered')">Scan</button>
            <button hx-post="/api/retrain" hx-swap="none" class="btn" onclick="toast('Retrain triggered')">Retrain</button>
            <button hx-post="/api/loop" hx-swap="none" class="btn" onclick="toast('Loop toggled')">Loop</button>
            <button onclick="document.getElementById('settings-modal').showModal()" class="btn">Config</button>
        </nav>
    </header>

    <main>
        <section class="activity-bar" id="activity-bar"
                 hx-get="/api/activity" hx-trigger="load, every 2s" hx-swap="innerHTML">
        </section>

        <section class="stats-row" hx-get="/api/stats" hx-trigger="load, every 10s" hx-swap="innerHTML">
        </section>

        <div class="grid">
            <!-- Left column: Trade History (top), Flagged Markets (bottom) -->
            <section class="card">
                <h2>Trades</h2>
                <div id="trades-table"></div>
            </section>

            <!-- Right column: PnL Chart (top) -->
            <section class="card chart-card">
                <h2>PnL History</h2>
                <canvas id="pnl-chart"></canvas>
            </section>

            <section class="card">
                <h2>Flagged Markets</h2>
                <div id="markets-list"></div>
            </section>

            <!-- Right column bottom: Live Feed + Lessons stacked -->
            <div class="split-col">
                <section class="card">
                    <h2>Live Feed</h2>
                    <div id="log-feed" class="log-feed" hx-get="/api/logs" hx-trigger="load, every 5s" hx-swap="innerHTML">
                    </div>
                </section>
                <section class="card">
                    <h2>Lessons</h2>
                    <div id="lessons-list" hx-get="/api/lessons" hx-trigger="load, every 30s" hx-swap="innerHTML">
                    </div>
                </section>
            </div>
        </div>
    </main>

    <dialog id="settings-modal">
        <h2>Configuration</h2>
        <p class="muted">In-memory only. Restart resets to .env values.</p>
        <form id="settings-form">
            <label>BANKROLL <input type="number" name="BANKROLL" step="any"></label>
            <label>MAX_BET_FRACTION <input type="number" name="MAX_BET_FRACTION" step="0.01"></label>
            <label>CONFIDENCE_THRESHOLD <input type="number" name="CONFIDENCE_THRESHOLD" step="0.01"></label>
            <label>MIN_EDGE_THRESHOLD <input type="number" name="MIN_EDGE_THRESHOLD" step="0.01"></label>
            <label>MAX_DAILY_LOSS <input type="number" name="MAX_DAILY_LOSS" step="any"></label>
            <label>LOOP_INTERVAL <input type="number" name="LOOP_INTERVAL" step="1"></label>
        </form>
        <button onclick="document.getElementById('settings-modal').close()" class="btn">Close</button>
    </dialog>

    <script>
    /* ── Dedupe: skip DOM updates when data hasn't changed ── */
    const _lastResponse = {};
    function unchanged(key, text) {
        if (_lastResponse[key] === text) return true;
        _lastResponse[key] = text;
        return false;
    }

    /* ── Escape HTML ── */
    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    /* ── Toast notifications ── */
    function toast(msg) {
        const el = document.createElement('div');
        el.className = 'toast';
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }

    /* ── PnL Chart ── */
    let pnlChart = null;
    async function refreshChart() {
        const resp = await fetch('/api/pnl-history');
        const data = await resp.json();
        const labels = data.map(d => d.date);
        const settled = data.map(d => d.cumulative_pnl);
        const total = data.map(d => d.total_pnl);

        if (!pnlChart) {
            const ctx = document.getElementById('pnl-chart').getContext('2d');
            const gradientTotal = ctx.createLinearGradient(0, 0, 0, 180);
            gradientTotal.addColorStop(0, 'rgba(96, 165, 250, 0.12)');
            gradientTotal.addColorStop(0.6, 'rgba(96, 165, 250, 0.02)');
            gradientTotal.addColorStop(1, 'rgba(96, 165, 250, 0)');

            pnlChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        {
                            label: 'Total (settled + unrealised)',
                            data: total,
                            borderColor: '#60A5FA',
                            borderWidth: 1.5,
                            backgroundColor: gradientTotal,
                            fill: true,
                            tension: 0.35,
                            pointRadius: 0,
                            pointHoverRadius: 4,
                            pointHoverBackgroundColor: '#60A5FA',
                            pointHoverBorderColor: '#0B0E14',
                            pointHoverBorderWidth: 2,
                        },
                        {
                            label: 'Settled PnL',
                            data: settled,
                            borderColor: '#00E68A',
                            borderWidth: 1.5,
                            borderDash: [4, 3],
                            fill: false,
                            tension: 0.35,
                            pointRadius: 0,
                            pointHoverRadius: 4,
                            pointHoverBackgroundColor: '#00E68A',
                            pointHoverBorderColor: '#0B0E14',
                            pointHoverBorderWidth: 2,
                        },
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            align: 'end',
                            labels: {
                                boxWidth: 12, boxHeight: 2, padding: 8,
                                font: { family: 'JetBrains Mono', size: 9 },
                                color: '#566175',
                            }
                        },
                        tooltip: {
                            backgroundColor: '#131820',
                            borderColor: '#1C2333',
                            borderWidth: 1,
                            titleFont: { family: 'Bricolage Grotesque', size: 10, weight: '600' },
                            bodyFont: { family: 'JetBrains Mono', size: 11, weight: '500' },
                            titleColor: '#566175',
                            bodyColor: '#E6EDF3',
                            padding: { x: 8, y: 6 },
                            cornerRadius: 4,
                            displayColors: true,
                            callbacks: {
                                label: ctx => ` ${ctx.dataset.label}: $${ctx.parsed.y.toFixed(2)}`
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(28, 35, 51, 0.5)', drawTicks: false },
                            ticks: {
                                font: { family: 'JetBrains Mono', size: 9 },
                                color: '#2E3848',
                                maxRotation: 0,
                                maxTicksLimit: 6,
                            },
                            border: { display: false },
                        },
                        y: {
                            grid: { color: 'rgba(28, 35, 51, 0.5)', drawTicks: false },
                            ticks: {
                                font: { family: 'JetBrains Mono', size: 9 },
                                color: '#2E3848',
                                callback: v => '$' + v,
                            },
                            border: { display: false },
                        }
                    },
                    layout: { padding: { top: 2 } }
                }
            });
        } else {
            pnlChart.data.labels = labels;
            pnlChart.data.datasets[0].data = total;
            pnlChart.data.datasets[1].data = settled;
            pnlChart.update('none');
        }
    }
    refreshChart();
    setInterval(refreshChart, 30000);

    /* ── Pagination helper ── */
    function renderPager(page, total, perPage, onPage) {
        const totalPages = Math.ceil(total / perPage);
        if (totalPages <= 1) return '';
        let html = '<div class="pager">';
        html += `<button class="pager-btn" ${page <= 1 ? 'disabled' : ''} onclick="${onPage}(${page - 1})">&laquo;</button>`;
        html += `<span class="pager-info">${page} / ${totalPages}</span>`;
        html += `<button class="pager-btn" ${page >= totalPages ? 'disabled' : ''} onclick="${onPage}(${page + 1})">&raquo;</button>`;
        html += '</div>';
        return html;
    }

    /* ── Trades (scrollable, no pagination) ── */
    function calcUnrealisedPnl(side, amount, entryPrice, currentPrice) {
        if (entryPrice <= 0 || entryPrice >= 1 || currentPrice == null) return null;
        const fee = amount * 0.02;
        if (side === 'YES') {
            const shares = amount / entryPrice;
            return shares * currentPrice - amount - fee;
        } else {
            const noPrice = 1.0 - entryPrice;
            const shares = amount / noPrice;
            const curNo = 1.0 - currentPrice;
            return shares * curNo - amount - fee;
        }
    }

    /* ── Sortable trades ── */
    let _tradesData = [];
    let _tradeSort = { col: null, asc: true };

    function sortTrades(col) {
        if (_tradeSort.col === col) {
            _tradeSort.asc = !_tradeSort.asc;
        } else {
            _tradeSort.col = col;
            _tradeSort.asc = true;
        }
        renderTrades();
    }

    function getTradeVal(t, col) {
        const isOpen = t.status === 'dry_run' || t.status === 'pending';
        switch(col) {
            case 'market': return (t.question || t.market_id || '').toLowerCase();
            case 'side': return t.side;
            case 'cost': return t.amount;
            case 'entry': return t.price;
            case 'now': return (isOpen && t.current_price != null) ? t.current_price : -999;
            case 'value': {
                if (isOpen && t.current_price != null && t.current_price > 0) {
                    let shares = t.side === 'YES' ? t.amount / t.price : t.amount / (1.0 - t.price);
                    let cur = t.side === 'YES' ? t.current_price : 1.0 - t.current_price;
                    return shares * cur;
                }
                if (!isOpen) {
                    const sp = t.pnl != null ? t.pnl : (t.hypothetical_pnl != null ? t.hypothetical_pnl : null);
                    if (sp !== null) return t.amount + sp;
                }
                return -999;
            }
            case 'pnl': {
                if (isOpen && t.current_price != null && t.current_price > 0)
                    return calcUnrealisedPnl(t.side, t.amount, t.price, t.current_price) || 0;
                const p = t.pnl != null ? t.pnl : (t.hypothetical_pnl != null ? t.hypothetical_pnl : null);
                return p !== null ? p : -999;
            }
            default: return 0;
        }
    }

    function renderTrades() {
        const el = document.getElementById('trades-table');
        if (_tradesData.length === 0) { el.innerHTML = '<p class="muted">No trades yet.</p>'; return; }

        let items = [..._tradesData];
        if (_tradeSort.col) {
            items.sort((a, b) => {
                let va = getTradeVal(a, _tradeSort.col), vb = getTradeVal(b, _tradeSort.col);
                if (typeof va === 'string') return _tradeSort.asc ? va.localeCompare(vb) : vb.localeCompare(va);
                return _tradeSort.asc ? va - vb : vb - va;
            });
        }

        const cols = ['market','side','cost','entry','now','value','pnl'];
        const labels = ['Market','Side','Cost','Entry','Now','Value','PnL'];
        let headerHtml = cols.map((c,i) => {
            let arrow = '';
            if (_tradeSort.col === c) arrow = _tradeSort.asc ? ' \u25B2' : ' \u25BC';
            return `<th class="sortable" onclick="sortTrades('${c}')">${labels[i]}${arrow}</th>`;
        }).join('');

        let html = '<div class="table-scroll"><table class="trades-tbl"><tr>' + headerHtml + '</tr>';
        items.forEach(t => {
            const name = esc(t.question || t.market_id || '');
            const sideStyle = t.side === 'YES' ? 'color:var(--neon)' : 'color:var(--red)';
            const isOpen = t.status === 'dry_run' || t.status === 'pending';

            // Entry price
            const entryStr = t.price.toFixed(2);

            // Current price (only for open trades with data)
            let nowStr = '\u2014';
            let nowStyle = 'color:var(--text-ghost)';
            if (isOpen && t.current_price != null && t.current_price > 0) {
                nowStr = t.current_price.toFixed(2);
                const delta = t.side === 'YES' ? t.current_price - t.price : t.price - t.current_price;
                nowStyle = delta >= 0 ? 'color:var(--neon)' : 'color:var(--red)';
            }

            // Cost = amount initially traded
            const costStr = '$' + t.amount.toFixed(0);

            // Value = current market value of shares (shares * current share price)
            let valueStr = '\u2014';
            let valueStyle = 'color:var(--text-ghost)';
            if (isOpen && t.current_price != null && t.current_price > 0) {
                let shares, curSharePrice;
                if (t.side === 'YES') {
                    shares = t.amount / t.price;
                    curSharePrice = t.current_price;
                } else {
                    shares = t.amount / (1.0 - t.price);
                    curSharePrice = 1.0 - t.current_price;
                }
                const value = shares * curSharePrice;
                valueStr = '$' + value.toFixed(0);
                valueStyle = value >= t.amount ? 'color:var(--neon)' : 'color:var(--red)';
            } else if (!isOpen) {
                // Settled: show final outcome
                const settled_pnl = t.pnl != null ? t.pnl : (t.hypothetical_pnl != null ? t.hypothetical_pnl : null);
                if (settled_pnl !== null) {
                    const value = t.amount + settled_pnl;
                    valueStr = '$' + Math.max(0, value).toFixed(0);
                    valueStyle = value >= t.amount ? 'color:var(--neon)' : 'color:var(--red)';
                }
            }

            // PnL: settled uses pnl/hypothetical_pnl, open uses unrealised calc
            let pnl = null;
            let pnlLabel = '';
            if (isOpen && t.current_price != null && t.current_price > 0) {
                pnl = calcUnrealisedPnl(t.side, t.amount, t.price, t.current_price);
                pnlLabel = ' ur';
            } else {
                pnl = t.pnl != null ? t.pnl : (t.hypothetical_pnl != null ? t.hypothetical_pnl : null);
            }
            const pnlStr = pnl !== null ? (pnl >= 0 ? '+' : '-') + '$' + Math.abs(pnl).toFixed(2) + pnlLabel : '\u2014';
            const pnlStyle = pnl !== null ? (pnl >= 0 ? 'color:var(--neon)' : 'color:var(--red)') : 'color:var(--text-ghost)';

            html += `<tr>
                <td class="td-market">${name}</td>
                <td style="${sideStyle};font-weight:600">${esc(t.side)}</td>
                <td>${costStr}</td>
                <td>${entryStr}</td>
                <td style="${nowStyle};font-weight:600">${nowStr}</td>
                <td style="${valueStyle};font-weight:600">${valueStr}</td>
                <td style="${pnlStyle};font-weight:600">${pnlStr}</td>
            </tr>`;
        });
        html += '</table></div>';
        el.innerHTML = html;
    }

    async function loadTrades() {
        const resp = await fetch('/api/trades?page=1&per_page=200');
        const text = await resp.text();
        if (unchanged('trades', text)) return;
        const data = JSON.parse(text);
        _tradesData = data.items || [];
        renderTrades();
    }
    loadTrades();
    setInterval(loadTrades, 10000);

    /* ── Markets (scrollable, no pagination) ── */
    async function loadMarkets() {
        const resp = await fetch('/api/markets?page=1&per_page=200');
        const text = await resp.text();
        if (unchanged('markets', text)) return;
        const data = JSON.parse(text);
        const el = document.getElementById('markets-list');
        if (data.total === 0) { el.innerHTML = '<p class="muted">No flagged markets.</p>'; return; }
        let html = '<div class="table-scroll"><table><colgroup><col style="width:auto"><col style="width:45px"><col style="width:170px"><col style="width:55px"></colgroup><tr><th>Market</th><th>YES</th><th>Result</th><th>Edge</th></tr>';
        data.items.forEach(m => {
            const price = m.yes_price.toFixed(2);
            const priceColor = m.yes_price > 0.7 ? 'var(--neon)' : m.yes_price < 0.3 ? 'var(--red)' : 'var(--text-secondary)';
            let resultHtml = '';
            if (m.trade_status) {
                resultHtml = `<span style="color:var(--neon);font-weight:600">${esc(m.recommended_side)} $${m.trade_amount.toFixed(0)}</span>`;
            } else if (m.approved === 0 && m.rejection_reason) {
                resultHtml = `<span style="color:var(--red);font-size:0.6rem;white-space:normal;word-break:break-word">${esc(m.rejection_reason)}</span>`;
            } else if (m.recommended_side) {
                resultHtml = `<span style="color:var(--amber)">${esc(m.recommended_side)}</span>`;
            } else {
                resultHtml = '<span style="color:var(--text-ghost);font-size:0.6rem">Not evaluated</span>';
            }
            const edgeHtml = m.edge != null
                ? `<span style="color:var(--blue);font-weight:500">${(m.edge * 100).toFixed(1)}%</span>`
                : '<span style="color:var(--text-ghost)">\u2014</span>';
            html += `<tr>
                <td>${esc(m.question||'')}</td>
                <td style="color:${priceColor};font-weight:600">${price}</td>
                <td>${resultHtml}</td>
                <td>${edgeHtml}</td>
            </tr>`;
        });
        html += '</table></div>';
        el.innerHTML = html;
    }
    loadMarkets();
    setInterval(loadMarkets, 10000);

    /* ── Settings ── */
    document.getElementById('settings-form').addEventListener('change', async (e) => {
        const key = e.target.name;
        const value = parseFloat(e.target.value);
        const resp = await fetch('/api/settings', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({key, value})
        });
        const result = await resp.json();
        if (!result.ok) {
            toast('Error: ' + result.error);
        } else {
            toast(key + ' updated');
        }
    });

    /* ── Prediction Ring Helper ── */
    function renderPredRing(approved, blocked, avgEdge, avgConf, accuracy) {
        const total = approved + blocked;
        const pct = total > 0 ? (approved / total) : 0;
        const circumference = 2 * Math.PI * 42;
        const offset = circumference * (1 - pct);
        const accDisplay = accuracy && accuracy.evaluated > 0
            ? `${(accuracy.accuracy * 100).toFixed(0)}%`
            : null;
        return `
            <div class="pred-ring-container">
                <div class="pred-ring">
                    <svg viewBox="0 0 100 100">
                        <circle class="pred-ring-bg" cx="50" cy="50" r="42"/>
                        <circle class="pred-ring-fill" cx="50" cy="50" r="42"
                                stroke-dasharray="${circumference}"
                                stroke-dashoffset="${offset}"/>
                    </svg>
                    <div class="pred-ring-center">
                        <span class="pred-ring-value">${total}</span>
                        <span class="pred-ring-label">predictions</span>
                    </div>
                </div>
                <div class="pred-stats">
                    <div class="pred-stat-row"><div class="pred-stat-dot approved"></div><span class="pred-stat-label">Approved</span><span class="pred-stat-value">${approved}</span></div>
                    <div class="pred-stat-row"><div class="pred-stat-dot blocked"></div><span class="pred-stat-label">Blocked</span><span class="pred-stat-value">${blocked}</span></div>
                    <div class="pred-stat-row"><div class="pred-stat-dot edge"></div><span class="pred-stat-label">Avg Edge</span><span class="pred-stat-value">${(avgEdge * 100).toFixed(1)}%</span></div>
                    <div class="pred-stat-row"><div class="pred-stat-dot conf"></div><span class="pred-stat-label">Avg Conf</span><span class="pred-stat-value">${(avgConf * 100).toFixed(0)}%</span></div>
                    ${accDisplay ? `<div class="pred-stat-row"><div class="pred-stat-dot approved"></div><span class="pred-stat-label">Accuracy</span><span class="pred-stat-value" style="color:var(--neon)">${accDisplay}</span></div>` : ''}
                </div>
            </div>`;
    }

    /* ── Log Level Detection ── */
    function logClass(line) {
        if (line.includes('[ERROR]')) return 'log-line log-error';
        if (line.includes('[WARNING]')) return 'log-line log-warning';
        if (line.includes('[BLOCKED]')) return 'log-line log-blocked';
        return 'log-line';
    }

    /* ── htmx Response Formatting ── */
    htmx.on('htmx:beforeSwap', function(evt) {
        var key = evt.detail.target.id || evt.detail.target.className;
        if (unchanged('htmx-' + key, evt.detail.xhr.responseText)) {
            evt.detail.shouldSwap = false;
            return;
        }

        /* Status badge */
        if (evt.detail.target.id === 'status-badge') {
            const d = JSON.parse(evt.detail.xhr.responseText);
            const mode = d.dry_run ? 'DRY RUN' : 'LIVE';
            const cls = d.dry_run ? 'badge-dry' : 'badge-live';
            const loop = d.loop_active ? '<span style="color:var(--blue);margin-left:0.3rem;font-weight:600;font-size:0.6rem">LOOP</span>' : '';
            const scan = d.scanning ? '<span style="color:var(--amber);margin-left:0.3rem;font-weight:600;font-size:0.6rem">SCANNING</span>' : '';
            evt.detail.serverResponse =
                `<span class="badge ${cls}">${mode}</span>` +
                `<span style="color:var(--text-ghost);font-size:0.65rem">#${d.cycle_count}</span>` +
                loop + scan +
                (d.last_error ? '<span style="color:var(--red);margin-left:0.3rem;font-weight:600;font-size:0.6rem">ERR</span>' : '');
        }

        /* Stats row */
        if (evt.detail.target.classList.contains('stats-row')) {
            const s = JSON.parse(evt.detail.xhr.responseText);
            const pnlColor = s.total_pnl >= 0 ? 'var(--neon)' : 'var(--red)';
            const pnlSign = s.total_pnl >= 0 ? '+' : '';
            const approvalRate = s.total_predictions > 0
                ? ((s.approved / s.total_predictions) * 100).toFixed(0) + '%'
                : '\u2014';
            const accStr = s.prediction_accuracy && s.prediction_accuracy.evaluated > 0
                ? (s.prediction_accuracy.accuracy * 100).toFixed(0) + '%'
                : '\u2014';
            evt.detail.serverResponse = `
                <div class="stat-card">
                    <div class="stat-value">${s.total_trades}</div>
                    <div class="stat-label">Total Trades</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${s.dry_run_pending || 0}</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${(s.win_rate*100).toFixed(0)}%</div>
                    <div class="stat-label">Win Rate (${s.wins}/${s.settled_trades || 0})</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color:${pnlColor}">${pnlSign}$${Math.abs(s.total_pnl).toFixed(2)}</div>
                    <div class="stat-label">Settled PnL</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color:${s.unrealised_pnl >= 0 ? 'var(--neon)' : 'var(--red)'}">${s.unrealised_pnl >= 0 ? '+' : ''}$${Math.abs(s.unrealised_pnl || 0).toFixed(2)}</div>
                    <div class="stat-label">Unrealised PnL</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${s.total_predictions || 0}</div>
                    <div class="stat-label">Predictions (${approvalRate})</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color:${accStr !== '\u2014' ? 'var(--neon)' : 'var(--text-ghost)'}">${accStr}</div>
                    <div class="stat-label">Accuracy</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${s.snapshot_count}</div>
                    <div class="stat-label">Snapshots</div>
                </div>`;
        }

        /* Log feed */
        if (evt.detail.target.id === 'log-feed') {
            const logs = JSON.parse(evt.detail.xhr.responseText);
            if (logs.length === 0) {
                evt.detail.serverResponse = '<p class="muted">No logs yet.</p>';
            } else {
                evt.detail.serverResponse = logs.map(l =>
                    `<div class="${logClass(l)}">${esc(l)}</div>`
                ).join('');
            }
        }

        /* Lessons */
        if (evt.detail.target.id === 'lessons-list') {
            const lessons = JSON.parse(evt.detail.xhr.responseText);
            if (lessons.length === 0) {
                evt.detail.serverResponse = '<p class="muted">No lessons yet.</p>';
            } else {
                evt.detail.serverResponse = '<ul>' + lessons.map(l =>
                    `<li><strong>${esc(l.category)}</strong> ${esc(l.lesson)}</li>`
                ).join('') + '</ul>';
            }
        }
    });
    </script>
</body>
</html>
